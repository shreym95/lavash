<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lavash — Resume Reference</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="toast" class="toast"></div>
  <nav id="navbar" class="navbar"></nav>
  <main id="app" class="app">
    <div class="loading">Loading…</div>
  </main>

  <footer class="footer">
    <svg class="footer-cat" viewBox="0 0 140 90" aria-hidden="true">
      <!-- floating zzz -->
      <g class="zzz">
        <text x="104" y="34" class="cat-z" style="font-size:13px">z</text>
        <text x="114" y="24" class="cat-z" style="font-size:16px">z</text>
        <text x="126" y="14" class="cat-z" style="font-size:20px">Z</text>
      </g>
      <!-- curled tail -->
      <path class="cat-body" d="M96 78 q26 4 24 -16 q-2 -14 -14 -10 q8 4 6 12 q-2 8 -16 6 Z"/>
      <!-- loaf body -->
      <path class="cat-body" d="M18 78 q-4 -40 34 -42 q40 -2 44 26 q3 16 -8 18 Z"/>
      <!-- ears -->
      <path class="cat-body" d="M30 44 l-3 -16 l16 8 Z"/>
      <path class="cat-body" d="M62 40 l6 -16 l11 12 Z"/>
      <path class="cat-ear-inner" d="M32 42 l-1.5 -9 l8 5 Z"/>
      <path class="cat-ear-inner" d="M63 39 l3.5 -9 l6 7 Z"/>
      <!-- closed sleepy eyes -->
      <path class="cat-line" d="M34 54 q4 4 8 0"/>
      <path class="cat-line" d="M52 52 q4 4 8 0"/>
      <!-- blush -->
      <ellipse class="cat-blush" cx="30" cy="60" rx="4.5" ry="2.6"/>
      <ellipse class="cat-blush" cx="64" cy="57" rx="4.5" ry="2.6"/>
      <!-- nose / mouth -->
      <path class="cat-line" d="M46 58 v3 M46 61 q-3 3 -6 1 M46 61 q3 3 6 1"/>
      <!-- whiskers -->
      <path class="cat-whisker" d="M20 56 h12 M20 61 h11 M60 54 h13 M61 59 h12"/>
    </svg>
    <p class="footer-text">Made with <span class="paw">🐾</span> &amp; a little <span class="meow">meow</span> · Lavash</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
